; Stable 60 FPS profile for Ubuntu/Proton on high-end laptops.
; Tuned for FF7 Remake with Luma on DX11, prioritizing frame-time consistency.
; Steam Launch option: MANGOHUD_CONFIG=fps_limit=0 vblank_mode=0 __GL_SYNC_TO_VBLANK=0 DXVK_FRAME_RATE=0 __NV_PRIME_RENDER_OFFLOAD=1 __GLX_VENDOR_LIBRARY_NAME=nvidia WINEDLLOVERRIDES="xinput1_3=n,b;dxgi=n,b" mangohud %command% -dx11

[SystemSettings]
niagara.CreateShadersOnLoad=1

[/Script/Engine.RendererSettings]
r.CreateShadersOnLoad=1
r.UseShaderCaching=1
r.AsyncPipelineCompile=1
r.DontLimitOnBattery=1
r.Streaming.UseAsyncRequestsForDDC=1
r.Streaming.AmortizeCPUToGPUCopy=1
r.Streaming.UseNewMetrics=1
r.Streaming.LimitPoolSizeToVRAM=1
r.ShaderPipelineCache.PreOptimizeEnabled=1
r.ShaderPipelineCache.SaveUserCache=1
r.ShaderPipelineCache.Enabled=1
r.UseAsyncShaderPrecompilation=1
r.OneFrameThreadLag=1
r.VolumetricRenderTarget.PreferAsyncCompute=1
r.SceneColorFringe.Max=0
r.SceneColorFringeQuality=0
r.Shadow.CachePreshadow=1
r.Shadow.CacheWholeSceneShadows=1
r.UniformBufferPooling=1
r.GPUCrashDebugging=0
r.CompileShadersForDevelopment=0
s.MaxIncomingRequestsToStall=0
s.MaxReadyRequestsToStallMB=0

[/Script/WindowsTargetPlatform.WindowsTargetSettings]
EnableMathOptimisations=True

[DevOptions.Shaders]
bAllowCompilingThroughWorkers=True
bAllowAsynchronousShaderCompiling=True

[/Script/Engine.StreamingSettings]
s.AsyncLoadingThreadEnabled=True
s.MinBulkDataSizeForAsyncLoading=0

[/Script/Engine.GarbageCollectionSettings]
gc.CreateGCClusters=1
gc.AllowParallelGC=1

[/Script/Engine.Engine]
bAllowMultiThreadedShaderCompile=True
bSmoothFrameRate=False
MinSmoothedFrameRate=5
MaxSmoothedFrameRate=0

[/Script/AkAudio.AkSettings]
bEnableMultiCoreRendering=True

[CrashReportClient]
bAgreeToCrashUpload=False
bImplicitSend=False

[Engine.ErrorHandling]
bPromptForRemoteDebugging=False
bPromptForRemoteDebugOnEnsure=False

[/Script/WInstrumentedProfilersSettings.WTelemetrySettings]
bEnableTelemetry=False

[FATHydraCrashHandler]
LogCrashReportHydra=off
LogCrashUploader=off

[Core.System]
+Suppress=ScriptWarning
+Suppress=Error
+Suppress=ScriptLog
+Suppress=Warning

[Core.Log]
LogPluginManager=all off
LogOnlineIdentity=all off
LogOnlineSession=all off
LogMemory=all off
LogPakFile=all off
LogTemp=all off
LogLinker=all off
LogOnline=all off
LogOnlineGame=all off
LogAnalytics=all off
LogConfig=all off
LogInteractiveProcess=all off
LogInput=all off
LogOnlineEntitlement=all off
LogOnlineEvents=all off
LogOnlineFriend=all off
LogOnlinePresence=all off
LogOnlineTitleFile=all off
LogOnlineUser=all off
Global=off

[ConsoleVariables]
; 60 FPS target with no engine-level VSync.
t.MaxFPS=60
r.VSync=0
rhi.SyncInterval=0

; Luma / dynamic resolution: hold 60 with high image quality and faster recovery.
r.DynamicRes.OperationMode=1
r.DynamicRes.MinScreenPercentage=55
r.DynamicRes.MaxScreenPercentage=80
r.ScreenPercentage=100

; Clean image.
r.MotionBlurQuality=0
r.Tonemapper.GrainQuantization=0
r.DepthOfFieldQuality=0
r.DepthOfField.FarBlur=0
r.Color.Fringe=0

; High-quality shadows without the instability of the ultra profile.
r.Shadow.MaxResolution=3072
r.Shadow.MaxCSMResolution=3072
r.Shadow.DistanceScale=1.20
r.Shadow.CSM.MaxCascades=3
r.Shadow.RadiusThreshold=0.02

; Balanced geometry and foliage distance to prevent heavy-scene collapses.
r.StaticMeshLODDistanceScale=0.50
r.SkeletalMeshLODBias=0
r.ViewDistanceScale=1.50
foliage.LODDistanceScale=1.25

; Texture and reflection quality.
r.MaxAnisotropy=16
r.SSR.Quality=3

; Strong AA with lower history cost than the cinematic presets.
r.PostProcessAAQuality=5
r.TemporalAA.Algorithm=1
r.TemporalAASamples=8

[/Script/Engine.GameUserSettings]
bUseVSync=False
FrameRateLimit=60.000000
